
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Franciny Ehlke | Landing Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav aria-label="Menu Principal">
            <div class="logo">Fran Ehlke</div>
            <div class="controls">
                <button onclick="toggleContrast()" aria-label="Alternar Alto Contraste">Contraste</button>
                <button onclick="changeFontSize('increase')" aria-label="Aumentar Fonte">A+</button>
                <button onclick="changeFontSize('decrease')" aria-label="Diminuir Fonte">A-</button>
            </div>
        </nav>
    </header>

    <main>
        <section id="hero" class="reveal">
            <h1>Franciny Ehlke</h1>
            <p>Empreendedora, Influenciadora e Criadora de Conteúdo.</p>
        </section>

        <section id="produtos" class="reveal">
            <h2>Linha Franciny Ehlke</h2>
            <div id="grid-produtos" class="grid-container">
                </div>
        </section>

        <section id="sobre" class="reveal">
            <h2>Dúvidas Frequentes</h2>
            <div id="faq-container">
                </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2023 Franciny Ehlke. Desenvolvido com foco em acessibilidade.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
