
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adote um Gatinho | Amor em Quatro Patas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav aria-label="Menu Principal">
            <div class="logo">MiauAdote</div>
            <div class="accessibility-controls">
                <button id="btn-contrast" title="Alternar Alto Contraste">🌓</button>
                <button id="btn-increase-font" title="Aumentar Fonte">A+</button>
                <button id="btn-decrease-font" title="Diminuir Fonte">A-</button>
            </div>
        </nav>
    </header>

    <main>
        <section id="hero" class="scroll-reveal">
            <h1>Encontre seu novo melhor amigo</h1>
            <p>Milhares de gatinhos esperam por um lar cheio de amor.</p>
        </section>

        <section id="filters" class="scroll-reveal">
            <div class="tabs" role="tablist">
                <button role="tab" aria-selected="true" id="tab-todos">Todos</button>
                <button role="tab" aria-selected="false" id="tab-filhotes">Filhotes</button>
                <button role="tab" aria-selected="false" id="tab-adultos">Adultos</button>
            </div>
        </section>

        <section id="cat-grid" class="container-grid scroll-reveal" aria-live="polite">
            </section>
    </main>

    <footer>
        <p>&copy; 2024 MiauAdote - ONG de Proteção Animal</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
