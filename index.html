
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Franciny Ehlke | Landing Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header role="banner">
        <nav>
            <ul>
                <li><button onclick="changeFontSize('increase')" aria-label="Aumentar fonte">A+</button></li>
                <li><button onclick="changeFontSize('decrease')" aria-label="Diminuir fonte">A-</button></li>
                <li><button onclick="toggleContrast()" aria-label="Alternar alto contraste">Contraste</button></li>
            </ul>
        </nav>
        <h1>Franciny Ehlke</h1>
    </header>

    <main>
        <section id="bio" aria-labelledby="heading-bio">
            <h2 id="heading-bio">Sobre Fran</h2>
            <div id="bio-container"></div>
        </section>

        <section id="produtos" aria-labelledby="heading-produtos">
            <h2 id="heading-produtos">Linha Fran by Glambox</h2>
            <div id="grid-produtos" class="grid-container">
                </div>
        </section>
    </main>

    <footer role="contentinfo">
        <p>&copy; 2024 Projeto Mentor Pedagógico</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
